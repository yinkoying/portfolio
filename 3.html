<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>停車費收據 - 115年企業碳盤查實戰輔導計劃碳盤查課程</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&display=swap');
        body {
            font-family: 'Times New Roman', 'BiauKai', 'DFKai-SB', 'Noto Serif TC', 'PMingLiU', serif;
        }
        @media print {
            body {
                background-color: white;
            }
            .no-print {
                display: none !important;
            }
            .print-container {
                box-shadow: none !important;
                border: none !important;
                margin: 0 !important;
                padding: 0 !important;
            }
        }
        .receipt-stamp {
            border: 2px solid #ef4444;
            color: #ef4444;
            padding: 4px 8px;
            font-weight: bold;
            border-radius: 4px;
            transform: rotate(-5deg);
            display: inline-block;
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen py-10 text-gray-800">

    <!-- 列印控制區 -->
    <div class="mb-6 no-print">
        <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded shadow transition duration-200 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
            </svg>
            列印收據
        </button>
    </div>

    <!-- 收據本體 -->
    <div class="print-container bg-white w-full max-w-lg p-10 border border-gray-300 shadow-xl relative mx-4">
        
        <!-- 背景裝飾線 -->
        <div class="absolute top-0 left-0 w-full h-2 bg-blue-800"></div>

        <!-- 標題區 -->
        <div class="text-center mb-8 pt-4">
            <h1 class="text-xl font-bold tracking-wider text-gray-900 mb-2">115年企業碳盤查實戰輔導計劃碳盤查課程</h1>
            <h2 class="text-xl font-medium tracking-widest border-b-2 border-gray-800 pb-2 inline-block px-8">繳費收據</h2>
        </div>

        <!-- 日期 -->
        <div class="flex justify-end items-center mb-6 text-sm">
            <div class="text-gray-600">
                <span class="font-semibold">日期：</span>115 年 04 月 01 日
            </div>
        </div>

        <!-- 內容區 -->
        <div class="space-y-6 text-lg mb-10">
            <div class="flex items-end">
                <span class="w-24 font-bold text-gray-700">茲收到</span>
                <span class="flex-1 border-b border-gray-500 pb-1 px-2 text-xl font-medium">學員 林宏仲</span>
            </div>
            
            <div class="flex items-end">
                <span class="w-24 font-bold text-gray-700">新台幣</span>
                <span class="flex-1 border-b border-gray-500 pb-1 px-2 tracking-widest text-xl font-medium">
                    壹佰伍拾元整 <span class="text-lg font-medium tracking-normal text-gray-800 ml-2">(NT$ 150)</span>
                </span>
            </div>

            <div class="flex items-end">
                <span class="w-24 font-bold text-gray-700">事　由</span>
                <span class="flex-1 border-b border-gray-500 pb-1 px-2 text-base">
                    代收 中華電信學院 板橋院本部 一日停車費
                </span>
            </div>
        </div>
        
    </div>

</body>
</html>
